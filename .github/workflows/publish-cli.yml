name: publish-cli

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: products/sdtk-spec/distribution/sdtk-spec-kit

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Sync toolkit payload
        run: powershell -ExecutionPolicy Bypass -File scripts/sync-toolkit-assets.ps1

      - name: Build payload manifest
        run: powershell -ExecutionPolicy Bypass -File scripts/build-toolkit-manifest.ps1

      - name: Verify payload integrity
        run: node -e "require('./src/lib/toolkit-payload').verify()"

      - name: Run quality gates
        run: powershell -ExecutionPolicy Bypass -File ..\\..\\..\\..\\scripts\\ci\\run-quality-gates.ps1

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      - name: npm pack
        run: npm pack

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload .tgz to GitHub Release (idempotent)
        shell: bash
        run: |
          TGZ_FILE=$(ls sdtk-spec-kit-*.tgz)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists. Uploading asset with --clobber."
            gh release upload "$GITHUB_REF_NAME" "$TGZ_FILE" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$TGZ_FILE" \
              --title "sdtk-spec-kit $GITHUB_REF_NAME" \
              --notes "Install: \`npm i -g sdtk-spec-kit\`

            Or from tarball:
            \`\`\`
            npm i -g https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/$TGZ_FILE
            \`\`\`"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
